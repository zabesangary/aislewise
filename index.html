<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisle Wise - Secure Environment</title>
    
    <!-- React & ReactDOM CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950">
    <!-- Root container for React -->
    <div id="root"></div>

    <!-- Application Code -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Inline SVG Icons (Replacing lucide-react for standalone use) ---
        const IconMapPin = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>);
        const IconShieldCheck = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>);
        const IconWifiOff = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.82"/><path d="M16.85 11.4a10 10 0 0 1 1.98.6"/><path d="M5 11.5a10 10 0 0 1 1.63-1.07"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>);
        const IconCpu = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="16" x="4" y="4" rx="2" ry="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>);
        const IconArrowRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>);
        const IconBox = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>);
        const IconLock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>);
        const IconActivity = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>);
        const IconMenu = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>);
        const IconX = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>);

        const StoreGraphVisualizer = () => {
            return (
                <div className="relative w-full h-80 bg-slate-900 rounded-2xl border border-slate-700 overflow-hidden flex items-center justify-center p-4 shadow-inner shadow-cyan-500/10">
                    <style>
                        {`
                        @keyframes flow {
                            from { stroke-dashoffset: 24; }
                            to { stroke-dashoffset: 0; }

                            stroke-dasharray: 12;
                            animation: flow 1s linear infinite;

                            50% { transform: scale(1.5); opacity: 0.5; }

                            transform-origin: center;
                            animation: pulse-node 2s ease-in-out infinite;
                        }
                        `}
                    </style>
                    <svg className="w-full h-full" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet">
                        {/* Floor Grid */}

                                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#334155" strokeWidth="0.5" opacity="0.3"/>
                            </pattern>
                        </defs>
                        <rect width="100%" height="100%" fill="url(#grid)" />

                        {/* Store Shelves (Obstacles) */}
                        <g fill="#1e293b" stroke="#475569" strokeWidth="1" rx="4">
                            <rect x="50" y="30" width="40" height="140" rx="4" />
                            <rect x="130" y="30" width="40" height="140" rx="4" />
                            <rect x="210" y="30" width="40" height="140" rx="4" />
                            <rect x="290" y="30" width="40" height="140" rx="4" />
                        </g>

                        {/* Graph Edges (Possible Routes) */}
                        <g stroke="#334155" strokeWidth="2" strokeDasharray="4 4" fill="none">
                            <path d="M 20 100 L 105 100" />
                            <path d="M 105 20 L 105 180" />
                            <path d="M 185 20 L 185 180" />
                            <path d="M 105 20 L 185 20" />
                            <path d="M 105 180 L 185 180" />
                            <path d="M 185 100 L 265 100" />
                            <path d="M 265 20 L 265 180" />
                            <path d="M 265 180 L 350 180" />
                            <path d="M 350 20 L 350 180" />
                        </g>

                        {/* Active Route (Calculated Path) */}
                        <path 
                            d="M 20 100 L 105 100 L 105 180 L 185 180 L 185 100 L 265 100 L 265 40 L 350 40" 
                            fill="none" 
                            stroke="#22d3ee" 
                            strokeWidth="3" 
                            className="path-flow drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]" 
                        />

                        {/* Graph Nodes */}
                        <g fill="#0f172a" stroke="#3b82f6" strokeWidth="2">
                            <circle cx="20" cy="100" r="5" />
                            <circle cx="105" cy="100" r="4" />
                            <circle cx="105" cy="180" r="4" />
                            <circle cx="185" cy="180" r="4" />
                            <circle cx="185" cy="100" r="4" />
                            <circle cx="265" cy="100" r="4" />
                            <circle cx="265" cy="40" r="4" />
                        </g>

                        {/* Target Destination Node */}
                        <circle cx="350" cy="40" r="6" fill="#22d3ee" className="node-pulse" />
                        <circle cx="350" cy="40" r="2" fill="#fff" />
                        
                        {/* Start Node */}
                        <circle cx="20" cy="100" r="4" fill="#ef4444" />

        };

        // --- Kiosk Hero Illustration ---
        const KioskIllustration = () => {

                    <svg viewBox="0 0 400 400" className="relative z-10 w-full h-full drop-shadow-[0_20px_30px_rgba(8,145,178,0.2)]" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="kioskGlow" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#22d3ee" stopOpacity="0.5" />
                                <stop offset="100%" stopColor="#020617" stopOpacity="0" />
                            </linearGradient>
                            <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="10" />
                            </filter>
                        </defs>

                        {/* Floor Reflection */}
                        <ellipse cx="200" cy="350" rx="140" ry="20" fill="url(#kioskGlow)" />
                        <ellipse cx="200" cy="350" rx="60" ry="8" fill="#22d3ee" filter="url(#blurGlow)" opacity="0.4" />

                        {/* Human Figure (Sleek Stylized Silhouette) */}
                        <g className="human-figure">
                            {/* Legs */}
                            <path d="M 120 350 L 140 240 L 160 350" stroke="#334155" strokeWidth="14" strokeLinecap="round" strokeLinejoin="round" />
                            {/* Torso */}
                            <path d="M 140 240 C 140 180, 150 160, 165 150" stroke="#64748b" strokeWidth="26" strokeLinecap="round" fill="none" />
                            {/* Head */}
                            <circle cx="175" cy="105" r="18" fill="#94a3b8" />
                            {/* Reaching Arm */}
                            <path d="M 160 160 C 190 170, 215 160, 235 140" stroke="#94a3b8" strokeWidth="12" strokeLinecap="round" fill="none" />
                        </g>

                        {/* Hardware: The Kiosk Stand */}
                        <g className="kiosk-hardware">
                            {/* Base Column */}
                            <path d="M 255 350 L 295 350 L 280 200 L 245 200 Z" fill="#0f172a" stroke="#1e293b" strokeWidth="2" />
                            <path d="M 255 350 L 275 350 L 260 200 L 245 200 Z" fill="#1e293b" /> {/* 3D bevel shading */}
                            
                            {/* Touchscreen Device Backing */}
                            <rect x="230" y="80" width="85" height="140" rx="8" fill="#020617" stroke="#334155" strokeWidth="4" transform="rotate(15 275 150)" />
                            
                            {/* Touchscreen Display Interface */}
                            <g transform="rotate(15 275 150)">
                                {/* Screen BG */}
                                <rect x="234" y="84" width="77" height="132" rx="4" fill="#0f172a" />
                                
                                {/* App Interface Elements (Mini Map) */}
                                <rect x="242" y="92" width="60" height="12" rx="2" fill="#1e293b" /> {/* Header */}
                                
                                {/* Store Shelves on Map */}
                                <rect x="245" y="115" width="12" height="35" rx="1" fill="#334155" />
                                <rect x="265" y="115" width="12" height="35" rx="1" fill="#334155" />
                                <rect x="285" y="115" width="12" height="35" rx="1" fill="#334155" />
                                <rect x="245" y="160" width="12" height="35" rx="1" fill="#334155" />
                                <rect x="265" y="160" width="12" height="35" rx="1" fill="#334155" />
                                <rect x="285" y="160" width="12" height="35" rx="1" fill="#334155" />

                                {/* A* Routing Path on Screen */}
                                <path d="M 251 190 L 251 155 L 271 155 L 271 108" stroke="#22d3ee" strokeWidth="2.5" strokeDasharray="4 4" fill="none">
                                    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" />
                                </path>
                                {/* Destination Pin */}
                                <circle cx="271" cy="108" r="3.5" fill="#22d3ee">
                                    <animate attributeName="r" values="3.5; 5.5; 3.5" dur="1.5s" repeatCount="indefinite" />
                                </circle>
                            </g>
                        </g>

                        {/* Interactive Touch Ripple */}
                        <circle cx="228" cy="133" r="15" stroke="#22d3ee" strokeWidth="2" fill="none" opacity="0.8">
                            <animate attributeName="r" values="2; 25" dur="1.5s" repeatCount="indefinite" />
                            <animate attributeName="opacity" values="1; 0" dur="1.5s" repeatCount="indefinite" />
                        </circle>
                        <circle cx="228" cy="133" r="4" fill="#fff" opacity="0.9" />

                        {/* Floating Digital Nodes (Tech Aesthetic) */}
                        <rect x="60" y="80" width="35" height="6" rx="2" fill="#334155" opacity="0.6">
                            <animate attributeName="y" values="80; 75; 80" dur="4s" repeatCount="indefinite" />
                        </rect>
                        <rect x="310" y="240" width="45" height="6" rx="2" fill="#334155" opacity="0.6">
                            <animate attributeName="y" values="240; 245; 240" dur="3s" repeatCount="indefinite" />
                        </rect>
                        <circle cx="90" cy="220" r="3" fill="#22d3ee" opacity="0.5">
                            <animate attributeName="cy" values="220; 210; 220" dur="2.5s" repeatCount="indefinite" />
                        </circle>
                    </svg>
                </div>
            );
        };

        // --- Main App Component ---
        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-cyan-500 selection:text-white overflow-x-hidden">
                
                {/* Navigation */}
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-slate-950/80 backdrop-blur-md border-b border-slate-800 py-4' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                    <div className="flex items-center gap-2">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                        <IconMapPin className="text-white w-6 h-6" />
                        </div>
                        <span className="text-2xl font-bold tracking-tight text-white">
                        Aisle<span className="text-cyan-400">Wise</span>
                        </span>
                    </div>

                    {/* Desktop Nav */}

                        <a href="#features" className="text-sm font-medium text-slate-300 hover:text-cyan-400 transition-colors">Platform</a>
                        <a href="#security" className="text-sm font-medium text-slate-300 hover:text-cyan-400 transition-colors">Security</a>
                        <a href="#continuity" className="text-sm font-medium text-slate-300 hover:text-cyan-400 transition-colors">Governance</a>
                        <button className="px-5 py-2.5 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 transition-all text-sm font-semibold backdrop-blur-sm">
                        Client Login
                        </button>
                        <button className="px-5 py-2.5 rounded-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold transition-all shadow-[0_0_20px_-5px_rgba(34,211,238,0.5)] hover:shadow-[0_0_25px_-5px_rgba(34,211,238,0.7)]">
                        Request Demo
                        </button>
                    </div>

                    {/* Mobile Menu Button */}
                    <button 
                        className="md:hidden p-2 text-slate-300 hover:text-white"
                        onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                    >
                        {isMobileMenuOpen ? <IconX className="w-6 h-6" /> : <IconMenu className="w-6 h-6" />}
                    </button>
                    </div>
                </nav>

                {/* Hero Section */}
                <section className="relative pt-32 pb-20 lg:pt-40 lg:pb-32 overflow-hidden">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-cyan-500/5 rounded-full blur-[120px] pointer-events-none"></div>
                    <div className="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>

                    <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid lg:grid-cols-2 gap-12 lg:gap-8 items-center">
                            
                            {/* Left Text Content */}
                            <div className="text-center lg:text-left z-10">
                                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-sm font-medium mb-8">
                                    <span className="flex h-2 w-2 rounded-full bg-cyan-400 animate-pulse"></span>
                                    Enterprise-Grade Kiosks & Navigation
                                </div>
                                
                                <h1 className="text-5xl md:text-6xl lg:text-7xl font-extrabold tracking-tight mb-8 leading-tight">
                                    Navigate the Aisles <br />
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600">
                                    With Digital Precision.
                                    </span>
                                </h1>
                                
                                <p className="text-lg md:text-xl text-slate-400 mb-10 leading-relaxed max-w-2xl mx-auto lg:mx-0">
                                    AisleWise delivers premium interactive touchscreen kiosks powered by ultra-fast, entirely localized 3D pathfinding. Zero cloud reliance. Total data sovereignty.
                                </p>
                                
                                <div className="flex flex-col sm:flex-row justify-center lg:justify-start gap-4">
                                    <button className="px-8 py-4 rounded-full bg-cyan-500 text-slate-950 font-bold text-lg transition-all hover:scale-105 hover:bg-cyan-400 shadow-[0_0_30px_-5px_rgba(34,211,238,0.4)] flex items-center justify-center gap-2">
                                    Explore Hardware <IconArrowRight className="w-5 h-5" />
                                    </button>
                                    <button className="px-8 py-4 rounded-full bg-slate-800 text-white font-semibold text-lg transition-all hover:bg-slate-700 border border-slate-700 hover:border-slate-600 flex items-center justify-center gap-2">
                                    <IconShieldCheck className="w-5 h-5 text-cyan-400" /> Read Governance Specs
                                    </button>
                                </div>
                            </div>

                            {/* Right Illustration */}
                            <div className="relative z-10">
                                <KioskIllustration />
                            </div>

                        </div>
                    </div>
                </section>

                {/* Trusted By Section */}
                {}
                <section className="py-10 border-y border-slate-800/80 bg-slate-900/30 relative overflow-hidden">
                    {/* Fade edges for infinite scroll illusion */}
                    <div className="absolute inset-0 bg-gradient-to-r from-slate-950 via-transparent to-slate-950 z-10 pointer-events-none"></div>
                    
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-0">
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-[0.2em] mb-8">Trusted by global security-conscious retailers</p>
                        
                        <div className="flex flex-wrap justify-center items-center gap-12 md:gap-20 opacity-60">
                            
                            {/* Logo 1: Apex Retail */}
                            <div className="flex items-center gap-2 text-slate-300 hover:text-cyan-400 hover:scale-105 transition-all duration-300 cursor-default">
                                <svg className="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 3-9 18h18Z"/></svg>
                                <span className="text-2xl font-bold tracking-tighter">APEX<span className="font-light">Retail</span></span>
                            </div>

                            {/* Logo 2: Omni */}
                            <div className="flex items-center gap-2 text-slate-300 hover:text-cyan-400 hover:scale-105 transition-all duration-300 cursor-default">
                                <svg className="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
                                <span className="text-2xl font-bold tracking-widest">OMNI</span>
                            </div>

                            {/* Logo 3: SecureMart */}
                            <div className="flex items-center gap-2 text-slate-300 hover:text-cyan-400 hover:scale-105 transition-all duration-300 cursor-default">
                                <svg className="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                <span className="text-2xl font-bold">SecureMart</span>
                            </div>

                            {/* Logo 4: Vertex Markets */}
                            <div className="flex items-center gap-2 text-slate-300 hover:text-cyan-400 hover:scale-105 transition-all duration-300 cursor-default">
                                <svg className="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                                <span className="text-2xl font-bold tracking-tight">VERTEX</span>
                            </div>

                            {/* Logo 5: Nexus Grocers */}
                            <div className="flex items-center gap-2 text-slate-300 hover:text-cyan-400 hover:scale-105 transition-all duration-300 cursor-default">
                                <svg className="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                <span className="text-2xl font-semibold">Nexus<span className="text-slate-400">Grocers</span></span>
                            </div>

                        </div>
                    </div>
                </section>

                {/* Features Section */}
                <section id="features" className="py-24 bg-slate-900/50 border-y border-slate-800/50 relative">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="text-center mb-16">
                        <h2 className="text-3xl md:text-4xl font-bold mb-4">Architected for the Aisles</h2>
                        <p className="text-slate-400 max-w-2xl mx-auto text-lg">
                        Our software operates exclusively on your hardware, turning complex floor plans into intuitive, lightning-fast customer experiences.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        {/* Feature 1 */}
                        <div className="p-8 rounded-3xl bg-slate-800/30 border border-slate-700/50 hover:bg-slate-800/50 hover:border-cyan-500/30 transition-all group">
                            <div className="w-16 h-16 rounded-2xl bg-slate-900 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-inner shadow-white/5">
                            <IconWifiOff className="w-8 h-8 text-cyan-400" />
                            </div>
