<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisle Wise - Secure Environment</title>
    
    <!-- React & ReactDOM CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950">
    <!-- Root container for React -->
    <div id="root"></div>

    <!-- Application Code -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Inline SVG Icons (Replacing lucide-react for standalone use) ---
        const IconMapPin = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>);
        const IconShieldCheck = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>);
        const IconWifiOff = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.82"/><path d="M16.85 11.4a10 10 0 0 1 1.98.6"/><path d="M5 11.5a10 10 0 0 1 1.63-1.07"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>);
        const IconCpu = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="16" x="4" y="4" rx="2" ry="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>);
        const IconArrowRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>);
        const IconBox = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>);
        const IconLock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>);
        const IconActivity = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>);
        const IconMenu = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>);
        const IconX = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>);

        // --- Main App Component ---
        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-cyan-500 selection:text-white overflow-x-hidden">
                
                {/* Navigation */}
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-slate-950/80 backdrop-blur-md border-b border-slate-800 py-4' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
                    <div className="flex items-center gap-2">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                        <IconMapPin className="text-white w-6 h-6" />
                        </div>
                        <span className="text-2xl font-bold tracking-tight text-white">
                        Aisle<span className="text-cyan-400">Wise</span>
                        </span>
                    </div>

                    {/* Desktop Nav */}
                    <div className="hidden md:flex items-center gap-8">
                        <a href="#features" className="text-sm font-medium text-slate-300 hover:text-cyan-400 transition-colors">Platform</a>
                        <a href="#security" className="text-sm font-medium text-slate-300 hover:text-cyan-400 transition-colors">Security</a>
                        <a href="#continuity" className="text-sm font-medium text-slate-300 hover:text-cyan-400 transition-colors">Governance</a>
                        <button className="px-5 py-2.5 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 transition-all text-sm font-semibold backdrop-blur-sm">
                        Client Login
                        </button>
                        <button className="px-5 py-2.5 rounded-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold transition-all shadow-[0_0_20px_-5px_rgba(34,211,238,0.5)] hover:shadow-[0_0_25px_-5px_rgba(34,211,238,0.7)]">
                        Request Demo
                        </button>
                    </div>

                    {/* Mobile Menu Button */}
                    <button 
                        className="md:hidden p-2 text-slate-300 hover:text-white"
                        onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                    >
                        {isMobileMenuOpen ? <IconX className="w-6 h-6" /> : <IconMenu className="w-6 h-6" />}
                    </button>
                    </div>
                </nav>

                {/* Hero Section */}
                <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none"></div>
                    <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[100px] pointer-events-none"></div>
                    
                    <div className="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>

                    <div className="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                    <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-sm font-medium mb-8">
                        <span className="flex h-2 w-2 rounded-full bg-cyan-400 animate-pulse"></span>
                        Enterprise-Grade In-Store Navigation
                    </div>
                    
                    <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 leading-tight">
                        Navigate the Physical World <br className="hidden md:block" />
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600">
                        With Digital Precision.
                        </span>
                    </h1>
                    
                    <p className="max-w-2xl mx-auto text-lg md:text-xl text-slate-400 mb-10 leading-relaxed">
                        AisleWise delivers ultra-fast, entirely localized 3D pathfinding for retail environments. Zero cloud reliance. Total data sovereignty.
                    </p>
                    
                    <div className="flex flex-col sm:flex-row justify-center gap-4">
                        <button className="px-8 py-4 rounded-full bg-cyan-500 text-slate-950 font-bold text-lg transition-all hover:scale-105 hover:bg-cyan-400 shadow-[0_0_30px_-5px_rgba(34,211,238,0.4)] flex items-center justify-center gap-2">
                        Deploy Locally <IconArrowRight className="w-5 h-5" />
                        </button>
                        <button className="px-8 py-4 rounded-full bg-slate-800 text-white font-semibold text-lg transition-all hover:bg-slate-700 border border-slate-700 hover:border-slate-600 flex items-center justify-center gap-2">
                        <IconShieldCheck className="w-5 h-5 text-cyan-400" /> Read Governance Specs
                        </button>
                    </div>
                    </div>
                </section>

                {/* Features Section */}
                <section id="features" className="py-24 bg-slate-900/50 border-y border-slate-800/50 relative">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="text-center mb-16">
                        <h2 className="text-3xl md:text-4xl font-bold mb-4">Architected for the Aisles</h2>
                        <p className="text-slate-400 max-w-2xl mx-auto text-lg">
                        Our software operates exclusively on your hardware, turning complex floor plans into intuitive, lightning-fast customer experiences.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        {/* Feature 1 */}
                        <div className="p-8 rounded-3xl bg-slate-800/30 border border-slate-700/50 hover:bg-slate-800/50 hover:border-cyan-500/30 transition-all group">
                            <div className="w-16 h-16 rounded-2xl bg-slate-900 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-inner shadow-white/5">
                            <IconWifiOff className="w-8 h-8 text-cyan-400" />
                            </div>
                            <h3 className="text-xl font-bold mb-3 text-white">100% Air-Gapped</h3>
                            <p className="text-slate-400 leading-relaxed">Zero egress architecture. AisleWise operates entirely offline, independent of the public internet, ensuring maximum security and uptime.</p>
                        </div>

                        {/* Feature 2 */}
                        <div className="p-8 rounded-3xl bg-slate-800/30 border border-slate-700/50 hover:bg-slate-800/50 hover:border-cyan-500/30 transition-all group">
                            <div className="w-16 h-16 rounded-2xl bg-slate-900 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-inner shadow-white/5">
                            <IconMapPin className="w-8 h-8 text-blue-400" />
                            </div>
                            <h3 className="text-xl font-bold mb-3 text-white">Millimeter Precision</h3>
                            <p className="text-slate-400 leading-relaxed">Advanced localized pathfinding algorithms guide customers directly to exact shelf locations without relying on external GPS.</p>
                        </div>

                        {/* Feature 3 */}
                        <div className="p-8 rounded-3xl bg-slate-800/30 border border-slate-700/50 hover:bg-slate-800/50 hover:border-cyan-500/30 transition-all group">
                            <div className="w-16 h-16 rounded-2xl bg-slate-900 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-inner shadow-white/5">
                            <IconCpu className="w-8 h-8 text-purple-400" />
                            </div>
                            <h3 className="text-xl font-bold mb-3 text-white">Edge Processing</h3>
                            <p className="text-slate-400 leading-relaxed">All queries, routing, and inventory searches are processed instantaneously on your on-premise hardware.</p>
                        </div>
                    </div>
                    </div>
                </section>

                {/* Governance & Security Section */}
                <section id="security" className="py-24 relative overflow-hidden">
                    <div className="absolute top-1/2 -right-40 w-96 h-96 bg-purple-600/20 rounded-full blur-[100px] pointer-events-none"></div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid lg:grid-cols-2 gap-16 items-center">
                        
                        <div>
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-400 text-sm font-semibold mb-6">
                            <IconLock className="w-4 h-4" /> Uncompromising Data Sovereignty
                        </div>
                        <h2 className="text-4xl font-bold mb-6 leading-tight">
                            Your Store. Your Data. <br/>
                            <span className="text-slate-500">Period.</span>
                        </h2>
                        <p className="text-lg text-slate-400 mb-8 leading-relaxed">
                            We believe in total data confinement. AisleWise is bound by a strict Master Software License & Data Governance Agreement. No cloud telemetry, no background trackers, no exceptions.
                        </p>
                        
                        <ul className="space-y-4">
                            {[
                            "Encrypted at rest on local hardware",
                            "Physical-only update deployment",
                            "Client retains 100% data ownership",
                            "No external API dependencies"
                            ].map((item, i) => (
                            <li key={i} className="flex items-center gap-3 text-slate-300">
                                <div className="w-6 h-6 rounded-full bg-cyan-500/20 flex items-center justify-center flex-shrink-0">
                                <IconShieldCheck className="w-4 h-4 text-cyan-400" />
                                </div>
                                {item}
                            </li>
                            ))}
                        </ul>
                        </div>

                        {/* Code/Terminal Mockup */}
                        <div className="relative rounded-2xl bg-slate-900 border border-slate-700 shadow-2xl p-6 font-mono text-sm overflow-hidden">
                        <div className="flex gap-2 mb-4 border-b border-slate-800 pb-4">
                            <div className="w-3 h-3 rounded-full bg-red-500"></div>
                            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                            <div className="w-3 h-3 rounded-full bg-green-500"></div>
                        </div>
                        <div className="text-slate-300 space-y-2">
                            <p><span className="text-purple-400">const</span> <span className="text-blue-400">networkConfig</span> = {'{'}</p>
                            <p className="pl-4">mode: <span className="text-green-400">'air-gapped'</span>,</p>
                            <p className="pl-4">externalConnections: <span className="text-orange-400">false</span>,</p>
                            <p className="pl-4">telemetry: <span className="text-orange-400">null</span>,</p>
                            <p className="pl-4">localEncryption: <span className="text-green-400">'AES-256'</span></p>
                            <p>{'};'}</p>
                            <br/>
                            <p><span className="text-slate-500">// Initiating local environment check...</span></p>
                            <p className="text-cyan-400">✓ Local LAN confirmed.</p>
                            <p className="text-cyan-400">✓ Zero external egress detected.</p>
                            <p className="text-green-400">System Ready. Operating in Stealth Mode.</p>
                        </div>
                        </div>

                    </div>
                    </div>
                </section>

                {/* Continuity Section */}
                <section id="continuity" className="py-24 bg-gradient-to-b from-slate-950 to-slate-900 border-t border-slate-800">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                    <h2 className="text-3xl md:text-4xl font-bold mb-6">Guaranteed Business Continuity</h2>
                    <p className="text-slate-400 max-w-2xl mx-auto text-lg mb-12">
                        Our contracts include rigorous Source Code Escrow provisions. In the event of unforeseen leadership incapacitation, your operations never halt.
                    </p>

                    <div className="grid md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                        <div className="p-6 rounded-2xl bg-slate-800/50 border border-slate-700/50 flex flex-col items-center text-center">
                        <IconActivity className="w-10 h-10 text-cyan-400 mb-4" />
                        <h4 className="font-bold text-lg mb-2">Neutral Escrow</h4>
                        <p className="text-sm text-slate-400">Latest stable source code is held by a secure, neutral third party.</p>
                        </div>
                        <div className="p-6 rounded-2xl bg-slate-800/50 border border-slate-700/50 flex flex-col items-center text-center">
                        <IconBox className="w-10 h-10 text-blue-400 mb-4" />
                        <h4 className="font-bold text-lg mb-2">Immediate Release</h4>
                        <p className="text-sm text-slate-400">Clear legal triggers ensure immediate code handover if conditions are met.</p>
                        </div>
                        <div className="p-6 rounded-2xl bg-slate-800/50 border border-slate-700/50 flex flex-col items-center text-center">
                        <IconShieldCheck className="w-10 h-10 text-purple-400 mb-4" />
                        <h4 className="font-bold text-lg mb-2">Perpetual License</h4>
                        <p className="text-sm text-slate-400">Client retains the right to modify and maintain code internally for survival.</p>
                        </div>
                    </div>
                    </div>
                </section>

                {/* Footer */}
                <footer className="border-t border-slate-800 bg-slate-950 pt-16 pb-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="grid md:grid-cols-4 gap-8 mb-12">
                        <div className="col-span-2">
                        <div className="flex items-center gap-2 mb-4">
                            <IconMapPin className="text-cyan-500 w-6 h-6" />
                            <span className="text-xl font-bold tracking-tight text-white">
                            Aisle<span className="text-cyan-400">Wise</span>
                            </span>
                        </div>
                        <p className="text-slate-400 text-sm max-w-sm">
                            Next-generation, air-gapped in-store navigation software. Providing total control, security, and performance for modern retail.
                        </p>
                        </div>
                        <div>
                        <h4 className="font-bold text-white mb-4">Legal & Governance</h4>
                        <ul className="space-y-2 text-sm text-slate-400">
                            <li><a href="#" className="hover:text-cyan-400 transition-colors">Master Software License</a></li>
                            <li><a href="#" className="hover:text-cyan-400 transition-colors">Data Confinement Protocols</a></li>
                            <li><a href="#" className="hover:text-cyan-400 transition-colors">Escrow Agreement Overview</a></li>
                        </ul>
                        </div>
                        <div>
                        <h4 className="font-bold text-white mb-4">Contact</h4>
                        <ul className="space-y-2 text-sm text-slate-400">
                            <li>Secure Comm Link:</li>
                            <li><a href="mailto:secure@aislewise.local" className="text-cyan-400 font-mono hover:underline">secure@aislewise.local</a></li>
                            <li className="mt-4">
                            <button className="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white transition-colors text-xs font-semibold">
                                Request Secure Audit
                            </button>
                            </li>
                        </ul>
                        </div>
                    </div>
                    <div className="border-t border-slate-800/50 pt-8 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-slate-500">
                        <p>© 2026 AisleWise Systems. All rights reserved.</p>
                        <p>System Status: <span className="text-green-400 animate-pulse">Online & Secure</span></p>
                    </div>
                    </div>
                </footer>

                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
